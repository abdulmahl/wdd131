<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Mduduzi Abdul Mahlangu" />
    <title>TrailWise · Explore Trails Hub</title>
    <meta
      name="description"
      content="Filter and search comprehensive trail route metadata files dynamically across multiple regional zones."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/project-base.css" />
    <link rel="stylesheet" href="styles/project-large.css" />
    <script src="scripts/project.js" defer></script>
    <link rel="icon" href="favicon.ico" />
  </head>
  <body>
    <header>
      <div class="nav-container">
        <h1>
          <a
            href="https://abdulmahl.github.io/wdd131/project/index.html"
            class="logo-mock"
          >
            🌲 TrailWise
          </a>
        </h1>
        <button class="hamburger" aria-label="Toggle navigation menu">
          ☰
        </button>
      </div>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="trails.html" class="active">Explore Trails</a></li>
          <li><a href="join.html">Join Hub</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h2>Dynamic Route Explorations</h2>
      <p class="filter">
        Filter through original database rows generated matching specific
        landscape constraints dynamically.
      </p>

      <section class="filter-controls">
        <div>
          <label for="filter-dog-friendly">🐾 Dog Friendly: </label>
          <select id="filter-dog-friendly">
            <option value="all">Show All Path Variants</option>
            <option value="yes">Pets Allowed (On-Leash)</option>
            <option value="no">No Animals Permitted</option>
          </select>
        </div>

        <div>
          <label for="filter-difficulty">⛰️ Difficulty Level: </label>
          <select id="filter-difficulty">
            <option value="all">All Difficulties</option>
            <option value="easy">Easy Exploration Loops</option>
            <option value="moderate">Moderate Routes</option>
            <option value="hard">Hard Technical Summits</option>
          </select>
        </div>
      </section>

      <section id="trail-gallery-target" class="card-container"></section>
    </main>

    <footer>
      <p>
        &copy; <span id="currentyear"></span> | TrailWise Hub | Mduduzi Abdul
        Mahlangu
      </p>
      <p id="lastModified"></p>
      <p>
        <a href="references.html">Project Attributions & Reference Sources</a>
      </p>
    </footer>
  </body>
</html>
